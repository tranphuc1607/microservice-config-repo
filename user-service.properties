# --- Eureka Client Configuration ---
eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
# Giúp Eureka hiển thị IP thay vì ID ngẫu nhiên (tùy chọn nhưng nên có)
eureka.instance.prefer-ip-address=true

# --- Database Configuration ---
# Đã thêm tham số tự động tạo DB nếu chưa có và fix lỗi SSL/TimeZone
spring.datasource.url=jdbc:mysql://mysql:3306/user_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate Configuration ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# FIX LỖI DIALECT: Ép Hibernate nhận diện MySQL 8+ ngay lập tức
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Tối ưu hóa kết nối Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
