# --- CẤU HÌNH EUREKA ---
eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# --- ROUTE 0: PRODUCT SERVICE ---
spring.cloud.gateway.routes[0].id=product-service
spring.cloud.gateway.routes[0].uri=lb://product-service
# Giữ nguyên path /api/v1/products/** để khớp với @RequestMapping("/api/v1/products")
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/products/**

# --- ROUTE 1: INVENTORY SERVICE ---
spring.cloud.gateway.routes[1].id=inventory-service
spring.cloud.gateway.routes[1].uri=lb://inventory-service
# Giữ nguyên path /api/v1/inventory/** để khớp với @RequestMapping("/api/v1/inventory")
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/inventory/**

# --- ROUTE 2: USER SERVICE ---
spring.cloud.gateway.routes[2].id=user-service
spring.cloud.gateway.routes[2].uri=lb://user-service
# Giữ nguyên path /api/v1/users/** để khớp với @RequestMapping("/api/v1/users")
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/users/**

# --- ROUTE 3: AUTH SERVICE (Thêm mới) ---
spring.cloud.gateway.routes[3].id=auth-service
spring.cloud.gateway.routes[3].uri=lb://auth-service
# Giữ nguyên path /api/v1/auth/** để khớp với @RequestMapping("/api/v1/auth") trong AuthController
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/auth/**
