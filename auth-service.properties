spring.datasource.url=jdbc:mysql://mysql:3306/auth_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456

# Driver mới nhất
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA & Hibernate cấu hình chặt chẽ
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Ép nhận Dialect để tránh lỗi metadata khi DB khởi động chưa kịp
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
